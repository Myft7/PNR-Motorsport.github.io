<!DOCTYPE html>
<html>
<head>
  <title>PNR Motorsport</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* ANIMIERTER HINTERGRUND */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(
        45deg,
        #0a0f2a 0px,
        #0a0f2a 2px,
        transparent 2px,
        transparent 40px
      );
      animation: moveBg 20s linear infinite;
      z-index: -1;
    }

    @keyframes moveBg {
      from { transform: translate(0, 0); }
      to { transform: translate(-200px, -200px); }
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.8);
      position: sticky;
      top: 0;
    }

    nav .logo {
      font-weight: bold;
      font-size: 20px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    nav ul li {
      cursor: pointer;
      transition: 0.3s;
    }

    nav ul li:hover {
      color: #3b5bff;
    }

    .discord-btn {
      background: linear-gradient(90deg, #0a2cff, #3b5bff);
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .discord-btn:hover {
      transform: scale(1.1);
    }

    /* HERO */
    .hero {
      padding: 120px 50px;
      text-align: left;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 20px;
      animation: fadeIn 1.5s ease;
    }

    .hero p {
      max-width: 500px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* BUTTON */
    .join {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 30px;
      background: #3b5bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .join:hover {
      background: #0a2cff;
      transform: scale(1.1);
    }

    /* SECTION */
    section {
      padding: 80px 20px;
      text-align: center;
    }

    h2 {
      color: #3b5bff;
    }

    .card {
      background: #0a0f2a;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #1a3cff;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">PNR MOTORSPORT</div>

  <ul>
    <li>Home</li>
    <li>Team</li>
    <li>Contact</li>
  </ul>

  <a class="discord-btn" href="https://discord.gg/TXhqstemqD" target="_blank">
    JOIN DISCORD
  </a>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>PNR MOTORSPORT</h1>
  <p>We aim for performance, passion and a strong simracing community.</p>

  <a class="join" href="https://discord.gg/TXhqstemqD" target="_blank">
    JOIN THE TEAM
  </a>
</div>

<!-- TEAM -->
<section>
  <h2>Team</h2>
  <div class="card">Owner: Noah Sejay</div>
</section>

<!-- SOCIAL -->
<section>
  <h2>Socials</h2>
  <a class="join" href="https://www.tiktok.com/@gt3hub_motorsport">TikTok</a>
  <a class="join" href="https://www.instagram.com/pnrmotorsport2026/">Instagram</a>
</section>

</body>
</html>
