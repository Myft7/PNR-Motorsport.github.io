<!DOCTYPE html>
<html>
<head>
  <title>PNR Motorsport</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(black, #050a1a);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
      font-size: 50px;
      font-weight: bold;
      letter-spacing: 3px;
      animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px #0a2cff; }
      to { text-shadow: 0 0 25px #0a2cff; }
    }

    section {
      padding: 50px 20px;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 1s forwards;
    }

    section:nth-child(2) { animation-delay: 0.5s; }
    section:nth-child(3) { animation-delay: 1s; }
    section:nth-child(4) { animation-delay: 1.5s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #3b5bff;
    }

    .card {
      background: #0a0f2a;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #1a3cff;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      text-decoration: none;
      color: white;
      background: #1a3cff;
      border-radius: 8px;
      transition: 0.3s;
    }

    .buttons a:hover {
      background: #0a2cff;
      transform: scale(1.1);
    }

    footer {
      padding: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>PNR MOTORSPORT</header>

<section>
  <h2>Über uns</h2>
  <p>PNR Motorsport ist ein Simracing Team mit Fokus auf Performance und Leidenschaft 🏎️</p>
</section>

<section>
  <h2>Team</h2>
  <div class="card">Owner: Noah Sejay</div>
</section>

<section>
  <h2>Join Us</h2>
  <div class="buttons">
    <a href="https://discord.gg/TXhqstemqD" target="_blank">Discord</a>
    <a href="https://www.tiktok.com/@gt3hub_motorsport" target="_blank">TikTok</a>
    <a href="https://www.instagram.com/pnrmotorsport2026/" target="_blank">Instagram</a>
  </div>
</section>

<footer>
  © 2026 PNR Motorsport
</footer>

</body>
</html>
