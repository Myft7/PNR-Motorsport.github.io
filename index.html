<!DOCTYPE html>
<html>
<head>
<title>PNR Motorsport</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* LOADING SCREEN */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:30px;
  letter-spacing:3px;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
}

nav ul {
  display:flex;
  gap:40px;
  list-style:none;
}

nav li { cursor:pointer; }
nav li:hover { color:#3b5bff; }

.join {
  padding:12px 30px;
  background:#3b5bff;
  border-radius:6px;
  color:white;
  text-decoration:none;
}

/* DISCORD COUNTER */
.counter {
  font-size:12px;
  opacity:0.7;
}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-left:80px;
}

.hero h1 { font-size:70px; }

/* FEATURED DRIVER */
.featured {
  text-align:center;
  padding:80px;
  background:rgba(10,15,42,0.5);
  backdrop-filter:blur(10px);
}

/* SECTION */
section {
  padding:100px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

section.show {
  opacity:1;
  transform:translateY(0);
}

/* CARDS */
.card {
  background:rgba(10,15,42,0.6);
  backdrop-filter:blur(10px);
  margin:20px auto;
  padding:20px;
  width:300px;
  border-radius:12px;
  border:1px solid rgba(59,91,255,0.3);
  transition:0.3s;
}

.card:hover {
  box-shadow:0 0 20px #3b5bff;
}

/* DRIVER */
.driver-card {
  display:flex;
  gap:15px;
  background:rgba(10,15,42,0.6);
  padding:15px;
  margin:10px;
  border-radius:12px;
  border:1px solid rgba(59,91,255,0.3);
  transition:0.3s;
}

.driver-card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #3b5bff;
}

.pfp {
  width:50px;
  height:50px;
  border-radius:50%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}
.pfp::after { content:"👤"; }

/* TEAM COLORS */
.main { border-color:#3b5bff; }
.academy { border-color:#555; }

</style>
</head>

<body>

<div id="loader">PNR MOTORSPORT</div>

<nav>
  <div><b>PNR MOTORSPORT</b></div>

  <ul>
    <li onclick="go('home')">HOME</li>
    <li onclick="go('teams')">TEAMS</li>
    <li onclick="go('contact')">CONTACT</li>
  </ul>

  <div>
    <a class="join" href="https://discord.gg/TXhqstemqD">JOIN NOW</a>
    <div class="counter">82 ONLINE • 480 MEMBERS</div>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
  <h1>PNR MOTORSPORT</h1>
  <p>Simracing Team</p>
</div>

<!-- FEATURED -->
<div class="featured">
  <h2>NOAH SEJAY</h2>
  <p>Team Owner • 🇪🇸 Spain</p>
</div>

<!-- RACING -->
<section>
  <h2>Racing</h2>
  <div class="card">Assetto Corsa Competizione</div>
  <div class="card">Le Mans Ultimate</div>
</section>

<!-- TEAMS -->
<section id="teams">
  <h2>Teams</h2>

  <div class="card main">
    <h3>Team 1</h3>

    <div class="driver-card">
      <div class="pfp"></div>
      <div>Driver 1 🇪🇸</div>
    </div>

    <div class="driver-card">
      <div class="pfp"></div>
      <div>Driver 2 🇩🇪</div>
    </div>

  </div>

  <div class="card academy">
    <h3>Academy</h3>

    <div class="driver-card">
      <div class="pfp"></div>
      <div>Driver 3 🇫🇷</div>
    </div>

  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>

  <a class="join" href="https://discord.gg/TXhqstemqD">JOIN NOW</a>
</section>

<script>
/* LOADER */
window.onload = () => {
  document.getElementById("loader").style.display="none";
};

/* SCROLL ANIMATION */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", ()=>{
  sections.forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

/* NAV SCROLL */
function go(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
